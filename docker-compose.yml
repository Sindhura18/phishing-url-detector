version: '3.8'

services:
  backend:
    build:
      context: .
      target: backend
    container_name: threat_api_backend
    ports:
      - "8000:8000"
    environment:
      - API_KEY=phish-detector-token-2026
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      target: frontend
    container_name: threat_analytics_frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - API_KEY=phish-detector-token-2026
      - PYTHONUNBUFFERED=1
    depends_on:
      backend:
        condition: service_healthy
